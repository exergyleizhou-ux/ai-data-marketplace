name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: app
          POSTGRES_PASSWORD: app
          POSTGRES_DB: app
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U app"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum
      - name: Resolve dependencies
        run: go mod tidy
      - name: Gofmt
        run: |
          out=$(gofmt -l .)
          if [ -n "$out" ]; then
            echo "These files are not gofmt-formatted:"
            echo "$out"
            exit 1
          fi
      - name: Vet
        run: go vet ./...
      - name: Vulncheck (govulncheck — report only, non-blocking)
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./... || true
      - name: Build
        run: go build ./...
      - name: Test (race-detector, no-cache, real-DB integration)
        env:
          DATABASE_URL: postgres://app:app@localhost:5432/app?sslmode=disable
        run: go test -race -count=1 -timeout 120s ./...

  backup-drill:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: app
          POSTGRES_PASSWORD: app
          POSTGRES_DB: app
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U app"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum
      - name: Install postgres client tools (pg_dump/pg_restore/psql)
        run: sudo apt-get update -q && sudo apt-get install -y -q postgresql-client
      - name: Backup → wipe → restore → verify (deploy/backup/drill.sh)
        env:
          DATABASE_URL: postgres://app:app@localhost:5432/app?sslmode=disable
        run: bash deploy/backup/drill.sh

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install
        run: npm install
      - name: Typecheck
        run: npm run typecheck
      - name: Lint
        run: npm run lint
      - name: Unit tests (Vitest + RTL)
        run: npm test
      - name: Build
        run: npm run build

  frontend-e2e:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: app
          POSTGRES_PASSWORD: app
          POSTGRES_DB: app
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U app"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend deps
        run: npm ci
      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium
      - name: Run full-stack E2E (real backend + Postgres)
        env:
          # global-setup uses this CI Postgres instead of spinning an ephemeral one.
          DATABASE_URL: postgres://app:app@localhost:5432/app?sslmode=disable
        run: npm run e2e
      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7

  sidecar:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/paperguard-sidecar
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps + PaperGuard (numeric table detectors)
        run: |
          python -m pip install --upgrade pip
          pip install "fastapi>=0.110" "uvicorn[standard]>=0.29" "pandas>=2.0" "pyarrow>=14" \
            "httpx>=0.27" "pytest>=8" \
            "git+https://github.com/exergyleizhou-ux/PaperGuard.git@v2.17.0"
      - name: Test (end-to-end against real PaperGuard)
        run: pytest -q
      - name: Test compute-to-data sandbox algorithms (logreg)
        working-directory: algorithms/logreg
        run: python test_train.py
      - name: Test compute-to-data sandbox algorithms (dp_stats)
        working-directory: algorithms/dp_stats
        run: python test_stats.py
      - name: Test §19 red-team probes are genuine (docker containment via run-redteam.sh)
        working-directory: algorithms/redteam
        run: python test_attack.py
