name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: app
          POSTGRES_PASSWORD: app
          POSTGRES_DB: app
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U app"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum
      - name: Resolve dependencies
        run: go mod tidy
      - name: Gofmt
        run: |
          out=$(gofmt -l .)
          if [ -n "$out" ]; then
            echo "These files are not gofmt-formatted:"
            echo "$out"
            exit 1
          fi
      - name: Vet
        run: go vet ./...
      - name: Build
        run: go build ./...
      - name: Test (race + real-DB integration)
        env:
          DATABASE_URL: postgres://app:app@localhost:5432/app?sslmode=disable
        run: go test -race ./...

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install
        run: npm install
      - name: Typecheck
        run: npm run typecheck
      - name: Lint
        run: npm run lint
      - name: Build
        run: npm run build

  sidecar:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/paperguard-sidecar
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps + PaperGuard (numeric table detectors)
        run: |
          python -m pip install --upgrade pip
          pip install "fastapi>=0.110" "uvicorn[standard]>=0.29" "pandas>=2.0" \
            "httpx>=0.27" "pytest>=8" \
            "git+https://github.com/exergyleizhou-ux/PaperGuard.git@v2.17.0"
      - name: Test (end-to-end against real PaperGuard)
        run: pytest -q
