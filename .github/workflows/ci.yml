name: Lumen CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lumen:
    name: Lumen — build + vet + test -race
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache: true

      - name: Build
        run: go build -o bin/lumen ./cmd/lumen

      - name: Vet
        run: go vet ./...

      - name: Test (race)
        run: go test -race -count=1 -timeout=60s ./...

  marketplace:
    name: Marketplace — build + vet + test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache: true
          cache-dependency-path: backend/go.sum

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test -count=1 -timeout=60s ./...
