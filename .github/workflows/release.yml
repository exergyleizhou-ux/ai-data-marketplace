# ===========================================================================
# CD Pipeline — 绿洲 docker build → push → deploy staging → deploy prod
# 触发: push tag v*.*.*
# 校验: actionlint .github/workflows/release.yml
# ===========================================================================

name: release

on:
  push:
    tags: ["v*.*.*"]

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      backend-digest: ${{ steps.build-backend.outputs.digest }}
      frontend-digest: ${{ steps.build-frontend.outputs.digest }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta-backend
        with:
          images: ghcr.io/${{ github.repository }}/backend
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - uses: docker/build-push-action@v5
        id: build-backend
        with:
          context: backend
          file: backend/Dockerfile
          push: true
          tags: ${{ steps.meta-backend.outputs.tags }}
          labels: ${{ steps.meta-backend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - uses: docker/metadata-action@v5
        id: meta-frontend
        with:
          images: ghcr.io/${{ github.repository }}/frontend
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - uses: docker/build-push-action@v5
        id: build-frontend
        with:
          context: frontend
          file: frontend/Dockerfile
          push: true
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-staging:
    needs: build-and-push
    runs-on: ubuntu-latest
    environment:
      name: staging
      # 在 GitHub repo Settings → Environments → staging 配置 required reviewers
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-kubectl@v4

      - name: Pin freshly-built image tags into the base manifests
        run: |
          sed -i "s#REGISTRY/ai-data-marketplace-backend:TAG#ghcr.io/${{ github.repository }}/backend:${{ github.ref_name }}#" deploy/k8s/base/30-backend.yaml
          sed -i "s#REGISTRY/ai-data-marketplace-frontend:TAG#ghcr.io/${{ github.repository }}/frontend:${{ github.ref_name }}#" deploy/k8s/base/40-frontend.yaml
      - name: Deploy to staging
        run: |
          kubectl apply -k deploy/k8s/overlays/staging/
          kubectl -n marketplace-staging rollout status deployment/stg-backend --timeout=5m
          kubectl -n marketplace-staging rollout status deployment/stg-frontend --timeout=5m

      - name: Smoke test staging
        run: |
          sleep 5
          STG_URL=$(kubectl -n marketplace-staging get ingress stg-ingress -o jsonpath='{.status.loadBalancer.ingress[0].hostname}')
          curl -sf "$STG_URL/api/v1/ping" || exit 1

      - name: Check 5xx rate (auto-rollback)
        run: |
          # 等 30 秒让 Prometheus 采集数据
          sleep 30
          # 若 5xx 率 > 1%, 回滚
          FIVEX=$(curl -s 'http://prometheus:9090/api/v1/query?query=sum(rate(marketplace_http_requests_total%7Bstatus%3D~"5.."%7D%5B1m%5D))/sum(rate(marketplace_http_requests_total%5B1m%5D))*100' | jq -r '.data.result[0].value[1] // "0"')
          if [ "$(echo "$FIVEX > 1" | bc)" -eq 1 ]; then
            echo "5xx rate $FIVEX% > 1%, rolling back staging"
            kubectl -n marketplace-staging rollout undo deployment/stg-backend
            kubectl -n marketplace-staging rollout undo deployment/stg-frontend
            exit 1
          fi
          echo "5xx rate $FIVEX% OK"

  deploy-prod:
    needs: deploy-staging
    runs-on: ubuntu-latest
    environment:
      name: production
      # Requires manual approval (no reviewers → manual trigger in GitHub UI)
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-kubectl@v4

      - name: Pin freshly-built image tags into the base manifests
        run: |
          sed -i "s#REGISTRY/ai-data-marketplace-backend:TAG#ghcr.io/${{ github.repository }}/backend:${{ github.ref_name }}#" deploy/k8s/base/30-backend.yaml
          sed -i "s#REGISTRY/ai-data-marketplace-frontend:TAG#ghcr.io/${{ github.repository }}/frontend:${{ github.ref_name }}#" deploy/k8s/base/40-frontend.yaml
      - name: Deploy to production
        run: |
          kubectl apply -k deploy/k8s/overlays/prod/
          kubectl -n marketplace rollout status deployment/backend --timeout=5m
          kubectl -n marketplace rollout status deployment/frontend --timeout=5m

      - name: Smoke test production
        run: |
          PROD_URL=$(kubectl -n marketplace get ingress ingress -o jsonpath='{.status.loadBalancer.ingress[0].hostname}')
          curl -sf "$PROD_URL/api/v1/ping" || exit 1
          curl -sf "$PROD_URL/healthz" || exit 1
