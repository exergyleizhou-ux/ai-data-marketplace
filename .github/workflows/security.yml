name: security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 4 * * 1" # 每周一 04:00 UTC

permissions:
  contents: read

jobs:
  backend-vuln:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - name: Scan backend
        working-directory: backend
        run: govulncheck ./...

  frontend-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        working-directory: frontend
        run: npm ci
      - name: Audit dependencies
        working-directory: frontend
        # Gate restored to high after the Next 16 / React 19 migration cleared
        # the Next-14-line HIGH advisories (Server-Components DoS / cache
        # poisoning / etc.). Only 2 transitive moderate (postcss) remain.
        run: npm audit --omit=dev --audit-level=high

  sbom:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Generate SPDX SBOM
        uses: anchore/sbom-action@v0
        with:
          format: spdx-json
          output-file: oasis-sbom.spdx.json
      - uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: oasis-sbom.spdx.json
          retention-days: 90
