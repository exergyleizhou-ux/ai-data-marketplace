global:
  resolve_timeout: 5m

templates:
  - "/etc/alertmanager/templates/*.tmpl"

route:
  receiver: default
  group_by: ["alertname", "severity"]
  group_wait: 10s
  group_interval: 10s
  repeat_interval: 12h
  routes:
    - match:
        severity: critical
      receiver: feishu-critical
      repeat_interval: 1h
    - match:
        severity: warning
      receiver: feishu-warning
      repeat_interval: 4h

receivers:
  - name: default
    webhook_configs:
      - url_file: /etc/alertmanager/secrets/default_url
        send_resolved: true

  - name: feishu-critical
    webhook_configs:
      - url_file: /etc/alertmanager/secrets/feishu_critical_url
        send_resolved: true

  - name: feishu-warning
    webhook_configs:
      - url_file: /etc/alertmanager/secrets/feishu_warning_url
        send_resolved: true

inhibit_rules:
  - source_match:
      alertname: BackendDown
    target_match_re:
      alertname: "P99LatencyHigh|P50LatencyHigh|High5xxRate"
    equal: ["instance"]
  - source_match:
      alertname: PostgresDown
    target_match:
      alertname: High5xxRate
