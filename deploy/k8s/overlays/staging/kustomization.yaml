apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: marketplace-staging
namePrefix: stg-
labels:
  - pairs:
      env: staging
    includeSelectors: false
resources:
  - ../../base
patches:
  - patch: |
      - op: replace
        path: /spec/replicas
        value: 1
    target:
      kind: Deployment
      name: backend
  - patch: |
      - op: replace
        path: /spec/replicas
        value: 1
    target:
      kind: Deployment
      name: frontend
  - patch: |
      - op: replace
        path: /spec/template/spec/containers/0/imagePullPolicy
        value: Always
    target:
      kind: Deployment
configMapGenerator:
  - name: staging-config
    literals:
      - APP_ENV=staging
