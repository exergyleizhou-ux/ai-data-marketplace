apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: marketplace
  labels: { app: frontend }
spec:
  replicas: 2
  selector:
    matchLabels: { app: frontend }
  template:
    metadata:
      labels: { app: frontend }
    spec:
      containers:
        - name: frontend
          # NEXT_PUBLIC_* are baked at build time — build the image with the real
          # API base + publishable key (see docs/部署手册.md), not via env here.
          image: REGISTRY/ai-data-marketplace-frontend:TAG
          ports:
            - containerPort: 3000
          readinessProbe:
            httpGet: { path: /, port: 3000 }
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests: { cpu: "50m", memory: "128Mi" }
            limits: { cpu: "300m", memory: "384Mi" }
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: marketplace
spec:
  selector: { app: frontend }
  ports:
    - port: 80
      targetPort: 3000
