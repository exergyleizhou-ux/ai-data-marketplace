openapi: "3.0.3"
info:
  title: AI Data Marketplace API
  description: >
    Oasis (绿洲) — a privacy-preserving data marketplace.  Modules: auth,
    datasets, orders, payments, delivery, compute (C2D), notifications,
    watchlist, Q&A, withdrawals, compliance, anomaly, audit-logs, search,
    verify.  Every response uses a uniform envelope (see
    components/schemas/Envelope).
  version: "1.0.0"
  contact:
    name: Oasis API Support

servers:
  - url: https://api.oasis.example.com/api/v1
    description: Production
  - url: http://localhost:8080/api/v1
    description: Local development

tags:
  - name: auth
    description: Registration, login, 2FA, password reset, KYC, user profile
  - name: datasets
    description: CRUD, upload, quality, certificate, croissant, datasheet, preview
  - name: orders
    description: Purchase lifecycle (create → pay → deliver → confirm → review)
  - name: payments
    description: Payment initiation, provider webhooks, settlement outbox
  - name: delivery
    description: Download grant issuance + byte streaming
  - name: compute
    description: C2D sandbox & federated compute (jobs, algorithms, entitlements)
  - name: notifications
    description: User notification list, read, preferences
  - name: watchlist
    description: Dataset watch / unwatch
  - name: qa
    description: Dataset Q&A (public questions, seller answers)
  - name: withdrawals
    description: Seller withdrawal requests + ops approval pipeline
  - name: compliance
    description: PIPL data export + account deletion
  - name: admin
    description: Ops-gated admin endpoints (KYC, datasets, reconciliation, anomalies, audit-logs)
  - name: search
    description: Full-text dataset search
  - name: verify
    description: Certificate verification

security:
  - bearerAuth: []

paths:
  # =========================================================================
  # AUTH
  # =========================================================================
  /auth/register:
    post:
      tags: [auth]
      summary: Register a new user
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [account, account_type, password]
              properties:
                account:      { type: string, description: "Email address" }
                account_type: { type: string, enum: [email] }
                password:     { type: string, minLength: 8 }
                agreements:
                  type: array
                  items:
                    type: object
                    properties:
                      doc:     { type: string }
                      version: { type: string }
      responses:
        "200": { $ref: "#/components/responses/TokenPairWithUser" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "429": { $ref: "#/components/responses/RateLimited" }

  /auth/login:
    post:
      tags: [auth]
      summary: Login — returns tokens or a 2FA challenge
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [account, password]
              properties:
                account:  { type: string }
                password: { type: string }
      responses:
        "200":
          description: >
            Tokens if 2FA not enrolled; challenge_token + need_2fa:true if
            2FA is active.
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/TokenPairWithUser"
                  - $ref: "#/components/schemas/TwoFAChallenge"
        "401": { $ref: "#/components/responses/Unauthorized" }

  /auth/refresh:
    post:
      tags: [auth]
      summary: Rotate tokens with a valid refresh token
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refresh_token]
              properties:
                refresh_token: { type: string }
      responses:
        "200": { $ref: "#/components/responses/TokenPairWithUser" }

  /auth/logout:
    post:
      tags: [auth]
      summary: Revoke a refresh token
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refresh_token]
              properties:
                refresh_token: { type: string }
      responses:
        "200":
          description: Token revoked
          content: { application/json: { schema: { $ref: "#/components/schemas/Envelope" } } }

  /auth/2fa/enroll:
    post:
      tags: [auth]
      summary: Start 2FA enrollment — returns secret URI + recovery codes
      responses:
        "200":
          description: Enrollment secret and recovery codes
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Envelope"
        "401": { $ref: "#/components/responses/Unauthorized" }

  /auth/2fa/verify-enrollment:
    post:
      tags: [auth]
      summary: Verify 2FA enrollment with a TOTP code
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [code]
              properties:
                code: { type: string, description: "6-digit TOTP code" }
      responses:
        "200": { $ref: "#/components/responses/OK" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /auth/2fa/disable:
    post:
      tags: [auth]
      summary: Disable 2FA (requires a valid TOTP code)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [code]
              properties:
                code: { type: string }
      responses:
        "200": { $ref: "#/components/responses/OK" }

  /auth/2fa/recovery-status:
    get:
      tags: [auth]
      summary: Get remaining recovery code count
      responses:
        "200":
          description: Recovery code status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Envelope"

  /auth/2fa/verify:
    post:
      tags: [auth]
      summary: Complete 2FA challenge — returns real tokens
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [challenge_token, code]
              properties:
                challenge_token: { type: string }
                code:            { type: string }
      responses:
        "200": { $ref: "#/components/responses/TokenPairWithUser" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /auth/password-reset/request:
    post:
      tags: [auth]
      summary: Request a password-reset email (always returns 200 for anti-enumeration)
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [account]
              properties:
                account: { type: string }
      responses:
        "200": { $ref: "#/components/responses/OK" }

  /auth/password-reset/complete:
    post:
      tags: [auth]
      summary: Complete password reset with the emailed token
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token, new_password]
              properties:
                token:        { type: string }
                new_password: { type: string, minLength: 8 }
      responses:
        "200": { $ref: "#/components/responses/OK" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /users/me:
    get:
      tags: [auth]
      summary: Get the authenticated user's profile
      responses:
        "200":
          description: User profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Envelope"
    put:
      tags: [auth]
      summary: Update the authenticated user's profile (role selection)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                role: { type: string }
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Envelope"

  /users/me/kyc:
    post:
      tags: [auth]
      summary: Submit KYC (real-name verification)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [type, real_name]
              properties:
                type:          { type: string, enum: [individual, enterprise] }
                real_name:     { type: string }
                company_name:  { type: string }
                id_no:         { type: string }
                material_urls: { type: array, items: { type: string } }
      responses:
        "200": { $ref: "#/components/schemas/Envelope" }
    get:
      tags: [auth]
      summary: Get the authenticated user's KYC status
      responses:
        "200":
          description: KYC record
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Envelope"

  /users/me/agreements:
    get:
      tags: [auth]
      summary: List signed agreements
      responses:
        "200":
          description: Agreement list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Envelope"
    post:
      tags: [auth]
      summary: Record signed agreements
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [agreements]
              properties:
                agreements:
                  type: array
                  items:
                    type: object
                    properties:
                      doc:     { type: string }
                      version: { type: string }
      responses:
        "200": { $ref: "#/components/schemas/Envelope" }

  # =========================================================================
  # DATASETS
  # =========================================================================
  /datasets:
    get:
      tags: [datasets]
      summary: Browse / search published datasets
      security: []
      parameters:
        - { name: q,             in: query, schema: { type: string }, description: "Full-text search query" }
        - { name: data_type,     in: query, schema: { type: string } }
        - { name: license_type,  in: query, schema: { type: string } }
        - { name: domain,        in: query, schema: { type: string } }
        - { name: min_price,     in: query, schema: { type: integer } }
        - { name: max_price,     in: query, schema: { type: integer } }
        - { name: sort,          in: query, schema: { type: string } }
        - { name: limit,         in: query, schema: { type: integer, default: 20 } }
        - { name: offset,        in: query, schema: { type: integer, default: 0 } }
      responses:
        "200":
          description: Paginated dataset list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Envelope"
    post:
      tags: [datasets]
      summary: Create a new dataset
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [title, description, data_type, license_type]
              properties:
                title:                 { type: string }
                description:           { type: string }
                data_type:             { type: string }
                domain:                { type: string }
                license_type:          { type: string }
                suggested_price_cents: { type: integer }
                source_declaration:    { type: string }
      responses:
        "200": { $ref: "#/components/schemas/Envelope" }

  /datasets/{id}:
    get:
      tags: [datasets]
      summary: Get a single dataset by ID
      security: []
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        "200":
          description: Dataset detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Envelope"
        "404": { $ref: "#/components/responses/NotFound" }
    put:
      tags: [datasets]
      summary: Update a dataset
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                title:       { type: string }
                description: { type: string }
                data_type:   { type: string }
      responses:
        "200": { $ref: "#/components/schemas/Envelope" }

  /datasets/{id}/quality:
    get:
      tags: [datasets]
      summary: Get quality check results
      security: []
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        "200":
          description: Quality check list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Envelope"

  /datasets/{id}/certificate:
    get:
      tags: [datasets]
      summary: Get dataset certificate
      security: []
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        "200":
          description: Dataset certificate
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Envelope"

  /datasets/{id}/croissant:
    get:
      tags: [datasets]
      summary: Get MLCommons Croissant metadata (JSON-LD)
      security: []
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        "200":
          description: Croissant metadata
          content:
            application/ld+json: {}

  /datasets/{id}/versions:
    get:
      tags: [datasets]
      summary: List dataset versions
      security: []
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        "200":
          description: Version list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Envelope"

  /datasets/{id}/preview:
    get:
      tags: [datasets]
      summary: Get a preview of the dataset (rate-limited)
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        "200": { $ref: "#/components/schemas/Envelope" }
        "429": { $ref: "#/components/responses/RateLimited" }

  /datasets/{id}/datasheet:
    put:
      tags: [datasets]
      summary: Set the dataset datasheet
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        "200": { $ref: "#/components/schemas/Envelope" }

  /datasets/{id}/source-declaration/sign:
    post:
      tags: [datasets]
      summary: Sign the source declaration
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        "200": { $ref: "#/components/schemas/Envelope" }

  /users/me/datasets:
    get:
      tags: [datasets]
      summary: List the authenticated user's own datasets
      parameters:
        - { name: limit,  in: query, schema: { type: integer } }
        - { name: offset, in: query, schema: { type: integer } }
      responses:
        "200":
          description: Owned datasets
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Envelope"

  /datasets/{id}/upload/init:
    post:
      tags: [datasets]
      summary: Initiate a multipart upload
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [filename]
              properties:
                filename: { type: string }
      responses:
        "200": { $ref: "#/components/schemas/Envelope" }

  /datasets/{id}/upload/part:
    put:
      tags: [datasets]
      summary: Upload one part of a multipart upload
      parameters:
        - { name: id,         in: path,  required: true,  schema: { type: string, format: uuid } }
        - { name: upload_id,  in: query, required: true,  schema: { type: string } }
        - { name: part_number,in: query, required: true,  schema: { type: integer } }
      requestBody:
        required: true
        content:
          application/octet-stream:
            schema:
              type: string
              format: binary
      responses:
        "200": { $ref: "#/components/schemas/Envelope" }

  /datasets/{id}/upload/complete:
    post:
      tags: [datasets]
      summary: Complete a multipart upload
      parameters:
        - { name: id,        in: path,  required: true, schema: { type: string, format: uuid } }
        - { name: upload_id, in: query, required: true, schema: { type: string } }
      responses:
        "200": { $ref: "#/components/schemas/Envelope" }

  /datasets/{id}/upload/status:
    get:
      tags: [datasets]
      summary: Get upload status
      parameters:
        - { name: id,        in: path,  required: true, schema: { type: string, format: uuid } }
        - { name: upload_id, in: query, required: true, schema: { type: string } }
      responses:
        "200": { $ref: "#/components/schemas/Envelope" }

  # =========================================================================
  # ORDERS
  # =========================================================================
  /orders:
    post:
      tags: [orders]
      summary: Create an order for a dataset
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [dataset_id, license_type]
              properties:
                dataset_id:   { type: string, format: uuid }
                license_type: { type: string }
      responses:
        "200": { $ref: "#/components/schemas/Envelope" }
        "409": { $ref: "#/components/responses/Conflict" }
    get:
      tags: [orders]
      summary: List the authenticated user's orders (buyer or seller view)
      parameters:
        - { name: role,   in: query, schema: { type: string, enum: [seller] }, description: "Set to 'seller' for sales view" }
        - { name: limit,  in: query, schema: { type: integer } }
        - { name: offset, in: query, schema: { type: integer } }
      responses:
        "200":
          description: Order list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Envelope"

  /orders/{id}:
    get:
      tags: [orders]
      summary: Get a single order
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        "200": { $ref: "#/components/schemas/Envelope" }
        "404": { $ref: "#/components/responses/NotFound" }

  /orders/{id}/confirm-delivery:
    post:
      tags: [orders]
      summary: Buyer confirms delivery (triggers settlement)
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        "200": { $ref: "#/components/schemas/Envelope" }
        "409": { $ref: "#/components/responses/Conflict" }

  /orders/{id}/dispute:
    post:
      tags: [orders]
      summary: Raise a dispute on an order
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [reason]
              properties:
                reason: { type: string }
      responses:
        "200": { $ref: "#/components/schemas/Envelope" }

  /orders/{id}/review:
    post:
      tags: [orders]
      summary: Review a settled order
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [score]
              properties:
                score:      { type: integer, minimum: 1, maximum: 5 }
                comment:    { type: string }
                issue_flag: { type: boolean }
      responses:
        "200": { $ref: "#/components/schemas/Envelope" }
        "409": { $ref: "#/components/responses/Conflict" }

  /sellers/me/earnings:
    get:
      tags: [orders]
      summary: Get the seller's earnings summary
      responses:
        "200":
          description: Earnings summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Envelope"

  /sellers/me/earnings/timeseries:
    get:
      tags: [orders]
      summary: Get seller's daily earnings timeseries
      parameters:
        - { name: days, in: query, schema: { type: integer, minimum: 1, maximum: 90, default: 30 } }
      responses:
        "200": { $ref: "#/components/schemas/Envelope" }

  /sellers/me/earnings/by-dataset:
    get:
      tags: [orders]
      summary: Get seller's earnings broken down by dataset
      responses:
        "200": { $ref: "#/components/schemas/Envelope" }

  /datasets/{id}/reviews:
    get:
      tags: [orders]
      summary: List reviews for a dataset
      security: []
      parameters:
        - { name: id,     in: path,  required: true, schema: { type: string, format: uuid } }
        - { name: limit,  in: query, schema: { type: integer } }
        - { name: offset, in: query, schema: { type: integer } }
      responses:
        "200":
          description: Review list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Envelope"

  /users/me/orders/bundle:
    post:
      tags: [orders]
      summary: Bundle-download multiple settled orders as a zip
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [order_ids]
              properties:
                order_ids:
                  type: array
                  items: { type: string, format: uuid }
                  minItems: 1
                  maxItems: 20
      responses:
        "200":
          description: Zip bundle stream
          content:
            application/zip:
              schema:
                type: string
                format: binary

  # =========================================================================
  # PAYMENTS
  # =========================================================================
  /payments/create:
    post:
      tags: [payments]
      summary: Initiate a payment for an order
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [order_id]
              properties:
                order_id: { type: string, format: uuid }
      responses:
        "200": { $ref: "#/components/schemas/Envelope" }
        "409": { $ref: "#/components/responses/Conflict" }

  /payments/dev/mark-paid:
    post:
      tags: [payments]
      summary: (DEV ONLY) Simulate a paid callback — never mounted in production
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [order_id]
              properties:
                order_id: { type: string, format: uuid }
      responses:
        "200": { $ref: "#/components/schemas/Envelope" }

  /payments/webhook/{channel}:
    post:
      tags: [payments]
      summary: Provider callback webhook (signature-verified, no JWT)
      security: []
      parameters:
        - { name: channel, in: path, required: true, schema: { type: string }, description: "e.g. stripe, mock" }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: string
      responses:
        "200": { $ref: "#/components/schemas/Envelope" }

  # =========================================================================
  # DELIVERY
  # =========================================================================
  /orders/{id}/download:
    post:
      tags: [delivery]
      summary: Request a one-time download token (accepts license)
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [license_agreed]
              properties:
                license_agreed: { type: boolean }
      responses:
        "200":
          description: Download URL with short-lived token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Envelope"
        "409": { $ref: "#/components/responses/Conflict" }

  /files/{token}:
    get:
      tags: [delivery]
      summary: Download file bytes (capability token, no JWT)
      security: []
      parameters:
        - { name: token, in: path, required: true, schema: { type: string } }
      responses:
        "200":
          description: File bytes (or 302 redirect to object store)
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary

  # =========================================================================
  # NOTIFICATIONS
  # =========================================================================
  /users/me/notifications:
    get:
      tags: [notifications]
      summary: List the user's notifications
      parameters:
        - { name: limit,  in: query, schema: { type: integer } }
        - { name: offset, in: query, schema: { type: integer } }
      responses:
        "200":
          description: Notification list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Envelope"

  /users/me/notifications/unread-count:
    get:
      tags: [notifications]
      summary: Count unread notifications
      responses:
        "200":
          description: Unread count
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Envelope"

  /users/me/notifications/read-all:
    post:
      tags: [notifications]
      summary: Mark all notifications as read
      responses:
        "200": { $ref: "#/components/schemas/Envelope" }

  /users/me/notifications/{id}/read:
