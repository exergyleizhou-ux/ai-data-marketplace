      summary: Reject an account deletion request
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [reason]
              properties:
                reason: { type: string }
      responses:
        "200": { $ref: "#/components/schemas/Envelope" }

  /admin/account-deletions/{id}/execute:
    post:
      tags: [admin]
      summary: Execute a deletion (scrubs PII, preserves financial records)
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        "200": { $ref: "#/components/schemas/Envelope" }

  /admin/compute/algorithms:
    get:
      tags: [admin]
      summary: List registered algorithms
      parameters:
        - { name: status, in: query, schema: { type: string } }
      responses:
        "200": { $ref: "#/components/schemas/Envelope" }
    post:
      tags: [admin]
      summary: Register a new algorithm
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, runtime, image, image_digest, version, entrypoint, output_kind]
              properties:
                name:          { type: string }
                runtime:       { type: string }
                image:         { type: string }
                image_digest:  { type: string }
                version:       { type: integer }
                source_ref:    { type: string }
                entrypoint:    { type: string }
                output_kind:   { type: string }
                params_schema: { type: object }
      responses:
        "200": { $ref: "#/components/schemas/Envelope" }

  /admin/compute/algorithms/{id}/review:
    post:
      tags: [admin]
      summary: Review an algorithm (trusted status)
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [status]
              properties:
                status:  { type: string }
                trusted: { type: boolean }
      responses:
        "200": { $ref: "#/components/schemas/Envelope" }

  /admin/compute/jobs:
    get:
      tags: [admin]
      summary: List all compute jobs
      parameters:
        - { name: status, in: query, schema: { type: string } }
        - { name: limit,  in: query, schema: { type: integer } }
      responses:
        "200": { $ref: "#/components/schemas/Envelope" }

  /admin/compute/jobs/{id}/release:
    post:
      tags: [admin]
      summary: Release a compute job output
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        "200": { $ref: "#/components/schemas/Envelope" }

  /admin/compute/jobs/{id}/reject:
    post:
      tags: [admin]
      summary: Reject a compute job
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                reason: { type: string }
      responses:
        "200": { $ref: "#/components/schemas/Envelope" }

# ===========================================================================
# COMPONENTS
# ===========================================================================
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    Envelope:
      type: object
      properties:
        code:
          type: integer
          description: "0 = success; 2xxx = client error; 5xxx = server error"
        message:
          type: string
        data:
          type: object
        request_id:
          type: string

    TokenPair:
      type: object
      properties:
        access_token:  { type: string }
        refresh_token: { type: string }

    TokenPairWithUser:
      type: object
      properties:
        user:
          type: object
          properties:
            id:      { type: string }
            account: { type: string }
            role:    { type: string }
        tokens:
          $ref: "#/components/schemas/TokenPair"

    TwoFAChallenge:
      type: object
      properties:
        need_2fa:        { type: boolean }
        challenge_token: { type: string }
        user:            { type: object }

  responses:
    OK:
      description: Success
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Envelope"
    BadRequest:
      description: Validation error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Envelope"
    Unauthorized:
      description: Missing or invalid credentials
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Envelope"
    Forbidden:
      description: Insufficient role / not the resource owner
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Envelope"
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Envelope"
    Conflict:
      description: Business rule violation (e.g. bad state transition)
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Envelope"
    RateLimited:
      description: Too many requests
      headers:
        Retry-After:
          schema: { type: integer }
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Envelope"
    TokenPairWithUser:
      description: Token pair + user profile
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Envelope"
